<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1"> <!-- serve per la resa responsive del sito su mobile -->

    <!-- Fonts di Google -->

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

<body>

    <!-- Navbar Bootstrap -->
    <nav class="navbar navbar-expand my-navbar">
        <div class="container-fluid"> <!-- elemento contenitore della navbar -->

            <!-- Logo -->
            <img class="gif" src="img/CineXpress.png" alt="logo CineXpress">

            <!-- Barra di ricerca -->
            <div class="search me-auto">
                <input type="text" id="searchInput" placeholder="Cerca...">
                <button id="searchBtn" class='btn btn-secondary'>
                    <i class='bi bi-search'></i>
                </button>
            </div>

            <!-- Menu della navbar -->
            <ul class="navbar-nav my-menu">

                <!-- HOME -->
                <li class="nav-item">
                    <a class="nav-link my-link" href="index.html">Home</a>
                </li>


                <!-- NOVITA -->
                <li class="nav-item">
    
                    <a 
                        href="#"
                        id="novitaLink"
                        class="nav-link text-white"
                    >
                        Novità
                    </a>

                </li>


                <!-- QUI APPARE SOLO ADMIN -->
                <div id="adminMenu"></div>


                <!-- QUI LOGIN / LOGOUT -->
                <div id="loginArea">

                    <li class="nav-item">
                        <a class="nav-link my-link"
                        href="#"
                        id="loginLink">

                        Login

                        </a>
                    </li>

                </div>

            </ul>
        </div>
    </nav>
    
    <!--da far inserire ad ariana-->
    <div id="home-content">

    <h1>Il cinema senza abbonamenti</h1>

    <p>Acquista i tuoi film e serie tv preferiti</p>

     <!--Inizio carosello film -->
    <h2 class="mt-5">Film</h2>

    <div id="movieCarousel" class="carousel slide" data-bs-ride="false">

        <button class="carousel-control-prev"
                type="button"
                data-bs-target="#movieCarousel"
                data-bs-slide="prev">

            <span class="carousel-control-prev-icon"></span>

        </button>

        <div class="carousel-inner"></div>

        <button class="carousel-control-next"
                type="button"
                data-bs-target="#movieCarousel"
                data-bs-slide="next">

            <span class="carousel-control-next-icon"></span>

        </button>

    </div>

    <!--Serie-->
    <h2 class="mt-5">Serie TV</h2>

    <div id="serieCarousel" class="carousel slide" data-bs-ride="false">

        <button class="carousel-control-prev"
                type="button"
                data-bs-target="#serieCarousel"
                data-bs-slide="prev">

            <span class="carousel-control-prev-icon"></span>

        </button>

        <div class="carousel-inner"></div>

        <button class="carousel-control-next"
                type="button"
                data-bs-target="#serieCarousel"
                data-bs-slide="next">

            <span class="carousel-control-next-icon"></span>

        </button>

    </div>

    </div>

    <!-- PAGINE DINAMICHE -->
    <div id="page-content"></div>
    
    <!-- Collegamenti a javascript -->
    <script src="app.js"></script>
    <script src="login.js"></script>
    <script src="read_products.js"></script>
    <script src="read_one_product.js"></script>
    <script src="acquisto.js"></script>
    <script src="search_products.js"></script>
    <script src="create_products.js"></script>
    <script src="delete_products.js"></script>
    <script src="update_products.js"></script>
    <script src="register.js"></script>
    <script src="novita.js"></script>
